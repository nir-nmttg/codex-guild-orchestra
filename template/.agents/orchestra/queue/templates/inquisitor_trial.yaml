artifact_type: "trial_assignment"
schema_version: "3.0"
workflow_id: null
structured_data_usage:
  structured_inputs: []
  decision_rationale: null
  evidence_refs: []
trial:
  id: null
  quest_id: null
  worker_id: inquisitor
  role: trial_specialist
  depth: null # none / self_check / peer_review / focused_trial / multi_focus_trial / safety_gate
  focus: []
  subject_assignment_ids: []
  subject_report_ids: []
  changed_files: []
  objective: null
  success_criteria: []
  authority:
    read: true
    edit: false
    validate: true
    local_git: false
    external_actions: false
  boundaries:
    target_repo_root: null # 実 Trial では `<guild_root>/repositories/<repo>` の実パスへ置換する
    read_deny: []
    edit_deny: []
    safety_items: []
  trial_checks:
    - intent_coverage
    - success_criteria
    - guild_law
    - authority_boundary
    - scope_boundary
    - safety_items
    - architecture_consistency
    - responsibility_split
    - readability
    - maintainability
    - validation_evidence
    - edge_cases
    - error_handling
    - security
    - performance
    - accessibility
    - compatibility
    - regression_risk
  depth_guardrails:
    multi_focus_trial:
      requires_focus_split: true
      allows_focus_advisors: true
      requires_owner_synthesis: true
      if_focus_is_insufficient: request_changes
    safety_gate:
      requires_human_or_safety_evidence: true
      if_evidence_is_missing: needs_human
  focus_advisors:
    consideration_required: true
    assignments: []
    owner_synthesis_required: true
    terminal_worker_required: true
    skip_reason_required_when_not_used: true
    skip_reason: null
  autonomy_budget:
    subassignments: 1
    extra_file_reads: 0
    validation_iterations: 1
    timebox_minutes: null
  research_plan:
    questions: []
    target_paths: []
    stop_conditions: []
  decision_options:
    - accept
    - accept_with_risks
    - request_changes
    - needs_human
    - blocked
  escalation_triggers: []
  evidence_required: []
  ledger:
    event_id: null
    report_expected: true
    advisor_report_ids: []
  status: idle
  timestamp: null
