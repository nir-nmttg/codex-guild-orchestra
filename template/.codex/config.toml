model = "gpt-5.6-sol"
# Root の reasoning effort はここでは固定せず、Sol の既定値または Codex 起動時のユーザー指定・上位設定を使う。
sandbox_mode = "read-only"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
web_search = "cached"
allow_login_shell = false

[sandbox_workspace_write]
network_access = false

[shell_environment_policy]
inherit = "core"
exclude = [
	"*secret*",
	"*token*",
	"*credential*",
	"*password*",
	"*key*",
	"*auth*",
]

[agents]
max_threads = 12
# Trial 統合担当の `inquisitor` は cost-aware に read-only focus reviewer 数を選び、
# 上限は `workers.inquisitor.max_parallel` と `autonomy_budget.subassignments` の小さい方にする。
# focus reviewer と advisor は同じ `autonomy_budget.subassignments` を消費する。
# `mapmaking` / `party_quest` / `guild_quest` / `multi_focus_trial` の owner は、
# `autonomy_budget.subassignments` があれば read-only `advisor` 利用を既定で検討し、使わない理由を残す。
# `advisor` は terminal worker（終端助言担当）として追加 subagent 起動（追加エージェント起動）を行わず、採否や Ledger 反映も行わない。
# `quest_sentinel` は read-only の制御監視担当で、confidence、unknowns、verification status から次アクションだけを推薦する。
max_depth = 4
job_max_runtime_seconds = 1200

[features]
codex_hooks = true
multi_agent = true
