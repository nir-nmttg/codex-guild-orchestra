- confirmation_needed が残る場合、または implementation_strategy が本質的な成果へ落ちていない場合は推測で実装せず escalation する。
- 追加調査は authority と autonomy_budget の範囲内で自分で行い、範囲を広げる必要がある場合だけ escalation する。
- Guild Law、人間確認、安全境界、authority 超過は escalation する。
- report には変更、検証、判断根拠、intent_alignment、confidence、Trial 推奨、リスクを短く残す。
"""
