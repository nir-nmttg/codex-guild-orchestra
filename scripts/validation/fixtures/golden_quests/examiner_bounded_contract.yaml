id: examiner_bounded_contract
fixture_mode: static_contract_example
summary: "examiner は具体的 risk focus に限定し、inquisitor が統合する"
input:
  trial_depth: multi_focus_trial
  risk_trigger: security
  focus: authorization_boundary
  assignment_snapshot:
    snapshot_id: "sha256:stable"
    revision_id: "abc123"
    diff_hash: "sha256:change"
  matching_report_snapshot:
    snapshot_id: "sha256:stable"
    revision_id: "abc123"
    diff_hash: "sha256:change"
  mismatched_report_snapshot:
    snapshot_id: "sha256:stale"
    revision_id: "def456"
    diff_hash: "sha256:other"
expected:
  worker_id: examiner
  assignment_owner: inquisitor
  examiner_role: bounded_trial_examiner
  risk_trigger_required: true
  concrete_focus_required: true
  read_only_required: true
  owner_synthesis_required: true
  finding_disposition_required: true
  sage_role: false
  final_decision_owner: inquisitor
  assignment_identity_required:
    worker_id: examiner
    owner_worker_id: inquisitor
  caller_enforcement: policy_only
  trial_lineage_validation: mechanical
  runtime_identity_acl: false
  event_actor_is_identity_backed_caller: false
  queue_lineage_required:
    trial_ref: true
    trial_owner_worker_id: inquisitor
    unverifiable_status: invalid_assignment
  matching_snapshot_status: matched
  mismatched_snapshot_status: stale_evidence
  child_snapshot_must_equal_parent_trial: true
  child_target_must_equal_parent_trial: true
  child_deny_and_safety_must_preserve_parent: true
  child_authority_must_equal_parent_trial: true
  report_binding_required: [examiner_assignment, inquisitor_trial, quest, workflow, subject_snapshot]
  examiner_summary_required: true
  examiner_evidence_refs_required: true
  evidence_item_schema: [id, summary]
  evidence_item_id_unique_within_trial: true
  final_summary_required: true
  final_evidence_refs_required: true
  final_disposition_exactly_once: true
  accepted_decision_forbids_unresolved: true
  caller_lineage_check_normalized_by_queue: true
  final_report_requires_all_examiner_reports: true
  recursive_multi_agent_disabled: true
  forbidden:
    missing_risk_trigger: true
    focus_expansion: true
    examiner_write_access: true
    examiner_acceptance_decision: true
    non_inquisitor_caller: true
    unverified_caller_lineage: true
    stale_evidence_reuse: true
    recursive_subagent: true
    over_depth_assignment: true
    wrong_assignment_report: true
    wrong_trial_report: true
    missing_completed_report: true
    missing_examiner_evidence: true
    undispositioned_evidence_item: true
    duplicate_evidence_item_id: true
    dropped_parent_safety_boundary: true
    sibling_target_repo: true
    wrong_examiner_report_owner: true
