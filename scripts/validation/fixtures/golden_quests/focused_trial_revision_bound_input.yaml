id: focused_trial_revision_bound_input
fixture_mode: static_contract_example
summary: "focused Trial は exact revision、report、changed files を固定した入力だけを採否する"
input:
  trial_depth: focused_trial
  subject_assignment_ids:
    - assignment_backend
  subject_report_ids:
    - report_backend
  base_ref: "commit:1ab2300"
  head_ref: "commit:8b91ce2"
  revision_id: "commit:8b91ce2"
  diff_hash: "sha256:1aa042d9"
  dirty_state:
    staged: false
    unstaged: false
    untracked: false
  changed_files:
    - src/auth.py
    - tests/test_auth.py
expected:
  worker_id: inquisitor
  trial_depth: focused_trial
  revision_binding:
    required: true
    source_kind: commit_sha
    base_ref: "commit:1ab2300"
    head_ref: "commit:8b91ce2"
    revision_id: "commit:8b91ce2"
    diff_hash: "sha256:1aa042d9"
    subject_assignment_ids:
      - assignment_backend
    subject_report_ids:
      - report_backend
    changed_files:
      - src/auth.py
      - tests/test_auth.py
    clean_dirty_state_required: true
    assignment_ids_bound: true
    report_ids_bound: true
    changed_files_bound: true
    evidence_bound_to_revision: true
    stale_evidence_outcome: stop
    moving_target_rejected: true
    revision_change_requires_rerun: true
  forbidden:
    accept_stale_diff: true
    unbound_finding_evidence: true
    accept_after_revision_change_without_rerun: true
