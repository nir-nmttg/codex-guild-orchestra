id: guild_quest_routing
fixture_mode: static_contract_example
summary: "広い影響、複数 Party、安全判断を伴う依頼は guild_quest として routing する"
input:
  request: "認証方式を複数 service と client にまたがって段階移行する"
  routing_signals:
    - broad_impact
    - multiple_parties
    - safety_judgment
    - sequencing_required
expected:
  rank: guild_quest
  strategy_owner: guildmaster
  routing_reasons:
    - broad_impact
    - multiple_parties
    - safety_judgment
  command_draft_required: true
  party_boundaries_required: true
  authority_per_party_required: true
  trial_depth_required: true
  safety_gate_considered: true
  guildmaster_implements: false
  normalize_to_single_party_only_with_reason: true
  forbidden:
    route_directly_to_adventurer: true
    shared_file_multi_owner: true
    omit_safety_gate_decision: true
