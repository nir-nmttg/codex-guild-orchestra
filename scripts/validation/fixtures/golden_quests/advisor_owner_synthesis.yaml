id: advisor_owner_synthesis
fixture_mode: static_contract_example
summary: "advisor report は未信頼材料であり、owner が evidence を確認して採否と未解決を統合する"
input:
  owner_worker_id: party_leader
  advisor_findings:
    - id: finding_verified
      evidence_ref: src/migration.sql
    - id: finding_unverified
      evidence_ref: null
expected:
  worker_id: advisor
  decision_authority: false
  terminal_worker: true
  owner_synthesis:
    required: true
    owner_worker_id: party_leader
    evidence_verification_required: true
    adopted_findings:
      - finding_verified
    rejected_findings:
      - finding_unverified
    unresolved_findings_recorded: true
    final_decision_by_owner_only: true
    advisor_judgment_is_not_owner_decision: true
  ledger_policy:
    owner_synthesis_rationale_recorded: true
    raw_discussion_recorded: false
  forbidden:
    advisor_acceptance_decision: true
    unverified_finding_adoption: true
    advisor_ledger_write: true
