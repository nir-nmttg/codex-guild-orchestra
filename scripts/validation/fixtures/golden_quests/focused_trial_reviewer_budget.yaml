id: focused_trial_reviewer_budget
summary: "focused Trial は reviewer 数、budget、cost reason を明示する"
input:
  request: "実装後に特定リスクだけ確認してください"
expected:
  trial_depth: focused_trial
  worker_id: inquisitor
  authority:
    read: true
    edit: false
    validate: false
    local_git: false
    external_actions: false
  focus_reviewers:
    count_decision_required: true
    max_bound_by:
      - workers.inquisitor.max_parallel
      - autonomy_budget.subassignments
    consumes_autonomy_budget: subassignments
    cost_reason_required: true
    finding_disposition_required: true
  handoff_sufficiency:
    trial_to_ledger_final_ready_requires:
      - decision
      - findings
      - intent_coverage
      - metacognitive_state
      - control_decision
      - validation_evidence
      - advisor_dialogue_synthesis
      - reviewer_synthesis
      - finding_dispositions
      - risks
