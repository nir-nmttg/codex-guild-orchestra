id: evidence_state_security_trigger
fixture_mode: static_contract_example
summary: "security-sensitive area は具体的 risk trigger とし、独立した security review を要求する"
input:
  touched_areas:
    - authorization
    - user_data
expected:
  high_risk_triggers:
    - security
  next_action: invoke_security_review
  security_review_owner: inquisitor
  new_worker_allowed: false
  verification_required: true
  forbidden:
    finalize_without_security_review: true
    suppress_risk_trigger: true
