id: claude_helper_only_disposition
fixture_mode: static_contract_example
summary: "Claude context は helper だけで読み、owner が disposition を記録する"
input:
  target_repo_root: "<guild_root>/repositories/example-app"
  artifact: ".claude/skills/deploy/SKILL.md"
  unsupported_fields:
    - allowed-tools
    - hooks
    - context:fork
expected:
  source_type: claude
  trust: untrusted
  access_path: helper_only
  helper: ".agents/orchestra/scripts/claude_compat.py"
  allowed_commands:
    - scan
    - render-context
    - render-skill
  direct_execution_allowed: false
  authority_granted: false
  disposition:
    required: true
    decided_by: assigned_owner
    allowed_values:
      - applied
      - rejected_conflict
      - ignored_irrelevant
      - skipped_unsafe
  ledger_fields:
    - relative_path
    - sha256
    - status
    - skip_reason
    - disposition
  raw_content_recorded: false
  forbidden:
    native_skill_install: true
    claude_tool_authority_conversion: true
    dynamic_command_execution: true
    raw_content_in_ledger: true
