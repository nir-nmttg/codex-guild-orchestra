id: party_integration_barrier_stable_revision
fixture_mode: static_contract_example
summary: "party integration は全 required report を待ち、固定した revision を Trial 入力にする"
input:
  rank: party_quest
  required_assignment_ids:
    - assignment_backend
    - assignment_frontend
    - assignment_migration
  completed_report_ids:
    - report_backend
    - report_frontend
    - report_migration
  integration_owner: adventurer_integration
  base_snapshot_id: "sha256:base"
  owned_scope_results:
    - assignment_id: assignment_backend
      scope_paths: [backend]
      diff_hash: "sha256:backend"
    - assignment_id: assignment_frontend
      scope_paths: [frontend]
      diff_hash: "sha256:frontend"
    - assignment_id: assignment_migration
      scope_paths: [migrations]
      diff_hash: "sha256:migration"
  final_revision_id: "commit:4d2a3f1"
  final_diff_hash: "sha256:db659ef3"
expected:
  rank: party_quest
  integration_barrier:
    required: true
    required_assignment_ids:
      - assignment_backend
      - assignment_frontend
      - assignment_migration
    required_report_ids:
      - report_backend
      - report_frontend
      - report_migration
    all_required_reports_complete: true
    single_integration_owner_required: true
    integration_owner: adventurer_integration
    integration_before_barrier_allowed: false
  stable_snapshot:
    required: true
    source: integrated_commit
    revision_id: "commit:4d2a3f1"
    diff_hash: "sha256:db659ef3"
    trial_bound_to_revision: true
    ledger_bound_to_revision: true
    implementation_edits_paused_during_trial: true
    revision_change_invalidates_trial: true
    revision_change_reopens_barrier: true
  parallel_snapshot_layers:
    base_snapshot_id: "sha256:base"
    owned_scope_results_required: true
    owned_scopes_must_not_overlap: true
    other_owned_scope_change_does_not_stale_report: true
    same_owned_scope_change_stales_report: true
    integrated_snapshot_only_after_barrier: true
  forbidden:
    integrate_incomplete_assignment: true
    trial_against_moving_target: true
    concurrent_shared_file_edit: true
    global_result_hash_per_parallel_worker: true
