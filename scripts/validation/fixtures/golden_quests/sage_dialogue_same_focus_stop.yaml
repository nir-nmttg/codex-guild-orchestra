id: sage_dialogue_same_focus_stop
fixture_mode: static_contract_example
summary: "sage は具体的な focus で verifiable evidence を追加できる間だけ続ける"
input:
  request: "設計の見落としだけ助言してください"
expected:
  worker_id: sage
  decision_authority: false
  terminal_worker: true
  evidence_policy:
    concrete_focus_required: true
    stop_when:
      - no_new_evidence_added
      - blocking_unknowns_unchanged
      - authority_or_boundary_would_expand
  forbidden:
    implementation: true
    acceptance_decision: true
    ledger_reflection: true
