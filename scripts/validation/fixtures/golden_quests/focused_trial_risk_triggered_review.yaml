id: focused_trial_risk_triggered_review
fixture_mode: static_contract_example
summary: "focused Trial は具体的な risk が独立確認を必要とする時だけ examiner を割り当てる"
input:
  request: "認可境界の変更を確認してください"
  high_risk_triggers:
    - security
expected:
  trial_depth: focused_trial
  worker_id: inquisitor
  nested_topology:
    root_depth: 0
    parent_role: inquisitor
    parent_depth: 1
    child_role: examiner
    child_depth: 2
    max_depth: 2
    parent_waits_and_synthesizes: true
    child_terminal: true
    child_snapshot_same_helper_object: true
    child_target_same_as_parent: true
    child_preserves_parent_deny_and_safety: true
  authority:
    read: true
    edit: false
    validate: true
    local_git: false
    external_actions: false
  examiner_assignment:
    worker_id: examiner
    risk_trigger: security
    focus: authorization_boundary
    read_only: true
    terminal_worker: true
  handoff_core:
    - objective
    - success_criteria
    - scope
    - authority
    - evidence_state
    - snapshot
    - risks
  forbidden:
    examiner_without_risk_trigger: true
    examiner_final_decision: true
    stale_snapshot_review: true
    wrong_nested_caller: true
    over_depth_assignment: true
    unverified_lineage: true
    missing_examiner_report_before_final: true
    examiner_report_from_other_trial: true
    examiner_without_substantive_evidence: true
    undispositioned_examiner_item: true
    child_drops_parent_boundary: true
